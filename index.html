<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Focus</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(37, 26, 108, 0.08);
      --accent: #3d318b;
      --accent2: #4d185f;
      --green: #4af797;
      --text: #f0f0f8;
      --muted: #7070a0;
      --radius: 16px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    a{
      text-decoration: none;
      color: #ffffff;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-head); overflow: hidden; }

    /* ── SCREENS ── */
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; transition: opacity 0.4s, transform 0.4s; }
    .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

    /* ── HOME ── */
    .logo { font-size: 42px; font-weight: 800; letter-spacing: -2px; margin-bottom: 6px; }
    .logo span { color: var(--accent); }
    .tagline { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 48px; }

    /* ── FIX 1: 3 columnas iguales, ancho ampliado ── */
    .role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; max-width: 560px; }

    .role-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .role-card:active { transform: scale(0.96); }
    .role-card.ctrl { border-color: rgba(124,106,247,0.4); }
    .role-card.cam  { border-color: rgba(117, 18, 134, 0.4); }
    .role-card .icon { font-size: 36px; }
    .role-card h2 { font-size: 15px; font-weight: 700; text-align: center; }
    .role-card p { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-align: center; line-height: 1.6; }

    .room-row { display: flex; gap: 10px; width: 100%; max-width: 560px; margin-top: 24px; }
    .room-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: 14px; outline: none;
    }
    .room-input:focus { border-color: var(--accent); }
    .room-input::placeholder { color: var(--muted); }

    /* ── BUTTONS ── */
    .btn {
      border: none; border-radius: 12px; padding: 14px 24px;
      font-family: var(--font-head); font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--accent2); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-green   { background: var(--green); color: #000; }
    .btn-full    { width: 100%; text-align: center; }

    /* ── STATUS PILL ── */
    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 100px; padding: 8px 16px;
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
    .dot.error { background: var(--accent2); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── CONTROLLER SCREEN ── */
    #ctrl-screen { justify-content: flex-start; padding: 0; }
    .ctrl-header {
      width: 100%; padding: 52px 24px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .ctrl-body { flex: 1; width: 100%; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

    /* Voice */
    .mic-btn {
      width: 88px; height: 88px; border-radius: 50%; border: none;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn.active { background: rgba(247,106,106,0.15); border-color: var(--accent2); box-shadow: 0 0 24px rgba(247,106,106,0.3); }
    .mic-btn:active { transform: scale(0.94); }
    .mic-icon { font-size: 36px; }
    .voice-hint { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: center; margin-top: 12px; }
    .keyword-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .kw-pill {
      background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3);
      border-radius: 100px; padding: 4px 12px;
      font-family: var(--font-mono); font-size: 11px; color: var(--accent);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .kw-pill .rm { color: var(--muted); font-size: 14px; }

    /* Freq */
    .freq-row { display: flex; align-items: center; gap: 12px; }
    .freq-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .freq-val { font-family: var(--font-mono); font-size: 13px; color: var(--accent); min-width: 48px; text-align: right; }
    .freq-toggle { display: flex; gap: 10px; margin-top: 12px; }

    /* Gallery */
    .gallery-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--surface2); border: 1px solid var(--border); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb.empty { display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); }

    /* ── CAMERA SCREEN ── */
    #cam-screen { padding: 0; }
    #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas { display: none; }
    .cam-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
    }
    .cam-top { padding: 52px 20px 20px; display: flex; align-items: center; justify-content: space-between; }
    .cam-bottom { margin-top: auto; padding: 20px 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    .shutter-ring {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .shutter-inner { width: 56px; height: 56px; border-radius: 50%; background: white; transition: all 0.1s; }
    .shutter-ring:active .shutter-inner { width: 48px; height: 48px; }
    .cam-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.08s; }
    .cam-flash.flash { opacity: 1; }
    .command-toast {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      padding: 12px 28px; font-size: 18px; font-weight: 700; letter-spacing: 1px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .command-toast.show { opacity: 1; }

    /* ── TOAST NOTIFY ── */
    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 20px;
      font-family: var(--font-mono); font-size: 12px; color: var(--text);
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── KEYWORD ADDER ── */
    .kw-add-row { display: flex; gap: 8px; margin-top: 12px; }
    .kw-add-row input { flex: 1; }

    /* Upload counter */
    .upload-badge {
      background: rgba(74,247,151,0.15); border: 1px solid rgba(74,247,151,0.3);
      border-radius: 100px; padding: 4px 12px;
      font-family: var(--font-mono); font-size: 11px; color: var(--green);
    }
  </style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div class="screen" id="home-screen">
  <div class="logo">Focus</div>
  <p class="tagline">control de Camara</p>

  <!-- FIX 2: IDs únicos para cada tarjeta -->
  <div class="role-grid">
    <div class="role-card ctrl" id="pick-ctrl">
      <span class="icon"><img src="focuslogo.png" width="100px" height="80px"></span>
      <h2>Control</h2>
    </div>
    <div class="role-card cam" id="pick-cam">
      <span class="icon"><img src="focuslogo.png" width="100px" height="80px"></span>
      <h2>Cámara</h2>
    </div>
    <div class="role-card ctrl" id="pick-ai"><a href="IAFocus.html">
      <span class="icon"><img src="focuslogo.png" width="100px" height="80px"></span>
      <h2>FocusAI</h2></a>
    </div>
  </div>

  <div class="room-row" style="margin-top:28px;">
    <input class="room-input" id="room-input" placeholder="Código de sala (ej. abc123)" maxlength="20" />
  </div>
  <div class="room-row" style="margin-top:0;">
    <button class="btn btn-ghost" style="flex:1;" onclick="generateRoom()">Generar</button>
  </div>
</div>

<!-- ══ CONTROLLER SCREEN ══ -->
<div class="screen hidden" id="ctrl-screen">
  <div class="ctrl-header">
    <div>
      <div style="font-size:18px;font-weight:800;">Controlador</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">Sala: <span id="ctrl-room-label">—</span></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="status-pill"><div class="dot" id="ctrl-dot"></div><span id="ctrl-status">desconectado</span></div>
      <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px;" onclick="leaveRoom()">✕</button>
    </div>
  </div>

  <div class="ctrl-body">

    <!-- VOICE -->
    <div class="card">
      <div class="card-label">controlador por medio de voz</div>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      </button>
      <div class="voice-hint" id="voice-hint">Presiona para escuchar</div>
      <div style="margin-top:16px;">
        <div class="card-label" style="margin-bottom:8px;">Palabras clave</div>
        <div class="keyword-pills" id="kw-pills"></div>
        <div class="kw-add-row">
          <input class="room-input" id="kw-input" placeholder="nueva palabra…" style="font-size:13px;padding:10px 14px;" />
          <button class="btn btn-primary" style="padding:10px 14px;font-size:13px;" onclick="addKeyword()">+</button>
        </div>
      </div>
    </div>

    <!-- MANUAL -->
    <div class="card">
      <div class="card-label">Captura Manual</div>
      <button class="btn btn-danger btn-full" id="shoot-btn" onclick="sendShoot()">Tomar foto ahora</button>
    </div>

    <!-- FREQUENCY -->
    <div class="card">
      <div class="card-label">Frecuencia para la fotografias</div>
      <div class="freq-row">
        <input type="range" min="2" max="60" value="10" id="freq-slider" oninput="updateFreq(this.value)" />
        <span class="freq-val" id="freq-val">10 s</span>
      </div>
      <div class="freq-toggle">
        <button class="btn btn-green btn-full" id="freq-start-btn" onclick="startFreq()">Iniciar Toma de fotos Automático</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:10px;" id="freq-status">Inactivo</div>
    </div>

    <!-- GALLERY -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="card-label" style="margin-bottom:0;">Últimas fotos</div>
        <div class="upload-badge" id="upload-count">0 subidas</div>
      </div>
      <div class="gallery-grid" id="gallery">
        <div class="thumb empty"><img src="focuslogo.png" width="40px" height="40px"></div>
        <div class="thumb empty"><img src="focuslogo.png" width="40px" height="40px"></div>
        <div class="thumb empty"><img src="focuslogo.png" width="40px" height="40px"></div>
      </div>
    </div>

    <!-- DRIVE CONFIG -->
    <div class="card">
      <div class="card-label">Google Drive</div>
      <input class="room-input" id="folder-id" placeholder="ID de carpeta de Drive" style="width:100%;margin-bottom:10px;" />
    </div>

  </div>
</div>

<!-- ══ CAMERA SCREEN ══ -->
<div class="screen hidden" id="cam-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="cam-flash" id="cam-flash"></div>
  <div class="command-toast" id="cmd-toast">📸 FOTO</div>

  <div class="cam-overlay">
    <div class="cam-top">
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="font-size:16px;font-weight:800;">📷 Cámara</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.6);">Sala: <span id="cam-room-label">—</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="status-pill"><div class="dot" id="cam-dot"></div><span id="cam-status">desconectado</span></div>
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px;border-color:rgba(255,255,255,0.2);" onclick="leaveRoom()">✕</button>
      </div>
    </div>
    <div class="cam-bottom">
      <button class="btn btn-ghost" style="border-color:rgba(255,255,255,0.2);color:white;" onclick="flipCamera()">🔄</button>
      <div class="shutter-ring" onclick="takePhotoManual()">
        <div class="shutter-inner"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.5);text-align:right;">
        <div id="cam-upload-info">Esperando…</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDQg2J9HfeWTzWSOI96htKfopN1j2dPe40",
  authDomain:        "focus-camera-8f15d.firebaseapp.com",
  databaseURL:       "https://focus-camera-8f15d-default-rtdb.firebaseio.com",
  projectId:         "focus-camera-8f15d",
  storageBucket:     "focus-camera-8f15d.firebasestorage.app",
  messagingSenderId: "1011789659876",
  appId:             "1:1011789659876:web:0430b271becb5659a8f6f1"
};

let DRIVE_ACCESS_TOKEN = "";

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let currentRole = null;
let roomId = null;
let roomRef = null;
let keywords = ["foto", "captura", "dispara", "shoot"];
let recognition = null;
let freqTimer = null;
let freqRunning = false;
let uploadCount = 0;
let facingMode = "environment";
let videoStream = null;

// ──────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function generateRoom() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let r = '';
  for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('room-input').value = r;
}

function leaveRoom() {
  if (roomRef) roomRef.remove();
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  stopFreq();
  stopMic();
  roomRef = null; roomId = null;
  showScreen('home-screen');
}

// ──────────────────────────────────────────────────────
// ROLE SELECTION
// ──────────────────────────────────────────────────────
// FIX 3: listener independiente para cada botón
document.getElementById('pick-ctrl').onclick = () => joinAs('controller');
document.getElementById('pick-cam').onclick  = () => joinAs('camera');
document.getElementById('pick-ai').onclick   = () => joinAs('focusai');

function joinAs(role) {
  const room = document.getElementById('room-input').value.trim();
  if (!room) { toast('⚠️ Ingresa un código de sala'); return; }
  currentRole = role;
  roomId = room;
  roomRef = db.ref(`rooms/${roomId}`);

  if (role === 'controller') {
    initController();
  } else if (role === 'camera') {
    initCamera();
  } else if (role === 'focusai') {
    toast('🤖 FocusAI — próximamente');
  }
}

// ──────────────────────────────────────────────────────
// CONTROLLER
// ──────────────────────────────────────────────────────
function initController() {
  showScreen('ctrl-screen');
  document.getElementById('ctrl-room-label').textContent = roomId;
  renderKeywords();

  roomRef.child('ctrl').set({ online: true, ts: Date.now() });
  roomRef.child('ctrl').onDisconnect().remove();

  roomRef.child('photos').on('child_added', snap => {
    const data = snap.val();
    addToGallery(data.dataUrl || data.driveUrl);
    uploadCount++;
    document.getElementById('upload-count').textContent = `${uploadCount} subidas`;
    snap.ref.remove();
  });

  roomRef.child('cam').on('value', snap => {
    const online = snap.val()?.online;
    setCtrlStatus(online ? 'cámara conectada' : 'esperando cámara…', online);
  });
}

function setCtrlStatus(text, connected) {
  document.getElementById('ctrl-status').textContent = text;
  const dot = document.getElementById('ctrl-dot');
  dot.className = 'dot' + (connected ? ' connected' : '');
}

function sendShoot() {
  if (!roomRef) return;
  roomRef.child('cmd').set({ action: 'shoot', ts: Date.now() });
  toast('📸 Comando enviado');
}

// ── VOICE ──
function toggleMic() {
  if (recognition && recognition._running) {
    stopMic();
  } else {
    startMic();
  }
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('⚠️ Tu navegador no soporta reconocimiento de voz'); return; }

  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition._running = true;

  recognition.onresult = (e) => {
    const last = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
    document.getElementById('voice-hint').textContent = `"${last}"`;
    if (keywords.some(kw => last.includes(kw.toLowerCase()))) {
      sendShoot();
      document.getElementById('voice-hint').textContent = `✅ Detectado: "${last}"`;
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') { toast('Error de micrófono: ' + e.error); stopMic(); }
  };

  recognition.onend = () => {
    if (recognition._running) recognition.start();
  };

  recognition.start();
  document.getElementById('mic-btn').classList.add('active');
  document.getElementById('voice-hint').textContent = 'Escuchando…';
}

function stopMic() {
  if (recognition) { recognition._running = false; recognition.stop(); recognition = null; }
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('voice-hint').textContent = 'Presiona para escuchar';
}

// ── KEYWORDS ──
function renderKeywords() {
  const container = document.getElementById('kw-pills');
  container.innerHTML = '';
  keywords.forEach((kw, i) => {
    const pill = document.createElement('div');
    pill.className = 'kw-pill';
    pill.innerHTML = `${kw} <span class="rm" onclick="removeKeyword(${i})">✕</span>`;
    container.appendChild(pill);
  });
}

function addKeyword() {
  const inp = document.getElementById('kw-input');
  const val = inp.value.trim().toLowerCase();
  if (val && !keywords.includes(val)) { keywords.push(val); renderKeywords(); }
  inp.value = '';
}

function removeKeyword(i) {
  keywords.splice(i, 1);
  renderKeywords();
}

document.getElementById('kw-input').addEventListener('keydown', e => { if (e.key === 'Enter') addKeyword(); });

// ── FREQUENCY ──
function updateFreq(val) {
  document.getElementById('freq-val').textContent = `${val} s`;
}

function startFreq() {
  if (freqRunning) { stopFreq(); return; }
  freqRunning = true;
  const secs = parseInt(document.getElementById('freq-slider').value);
  document.getElementById('freq-start-btn').textContent = '⏹ Detener automático';
  document.getElementById('freq-start-btn').className = 'btn btn-danger btn-full';
  document.getElementById('freq-status').textContent = `Disparando cada ${secs}s…`;
  freqTimer = setInterval(() => sendShoot(), secs * 1000);
}

function stopFreq() {
  clearInterval(freqTimer);
  freqRunning = false;
  document.getElementById('freq-start-btn').textContent = '▶ Iniciar automático';
  document.getElementById('freq-start-btn').className = 'btn btn-green btn-full';
  document.getElementById('freq-status').textContent = 'Inactivo';
}

// ── GALLERY ──
function addToGallery(src) {
  const grid = document.getElementById('gallery');
  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  const img = document.createElement('img');
  img.src = src;
  thumb.appendChild(img);
  img.onclick = () => window.open(src, '_blank');
  grid.insertBefore(thumb, grid.firstChild);
  grid.querySelectorAll('.empty').forEach((el, i) => { if (i === 0) el.remove(); });
}

// ──────────────────────────────────────────────────────
// CAMERA
// ──────────────────────────────────────────────────────
async function initCamera() {
  showScreen('cam-screen');
  document.getElementById('cam-room-label').textContent = roomId;

  await startVideo();

  roomRef.child('cam').set({ online: true, ts: Date.now() });
  roomRef.child('cam').onDisconnect().remove();

  roomRef.child('ctrl').on('value', snap => {
    const online = snap.val()?.online;
    document.getElementById('cam-status').textContent = online ? 'ctrl conectado' : 'esperando ctrl…';
    const dot = document.getElementById('cam-dot');
    dot.className = 'dot' + (online ? ' connected' : '');
  });

  roomRef.child('cmd').on('value', snap => {
    const cmd = snap.val();
    if (!cmd) return;
    if (cmd.action === 'shoot') {
      showCmdToast('📸 FOTO');
      takePhoto();
      snap.ref.remove();
    }
  });
}

async function startVideo() {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = videoStream;
  } catch (err) {
    toast('Error de cámara: ' + err.message);
  }
}

function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startVideo();
}

function takePhotoManual() {
  showCmdToast('📸');
  takePhoto();
}

function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const flash = document.getElementById('cam-flash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 150);

  canvas.toBlob(async (blob) => {
    document.getElementById('cam-upload-info').textContent = 'Subiendo…';
    const folderId = await getFolderIdFromCtrl();
    let result;
    if (folderId && DRIVE_ACCESS_TOKEN) {
      result = await uploadToDrive(blob, folderId);
    } else {
      result = await sendViaFirebase(blob);
    }
    document.getElementById('cam-upload-info').textContent = result;
  }, 'image/jpeg', 0.92);
}

async function getFolderIdFromCtrl() {
  const snap = await roomRef.child('config/folderId').get();
  return snap.val();
}

async function uploadToDrive(blob, folderId) {
  try {
    const filename = `fotovoz_${new Date().toISOString().replace(/[:.]/g,'-')}.jpg`;
    const meta = { name: filename, parents: [folderId] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);

    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${DRIVE_ACCESS_TOKEN}` },
      body: form
    });
    const data = await res.json();
    const driveUrl = `https://drive.google.com/file/d/${data.id}/view`;
    roomRef.child('photos').push({ driveUrl, ts: Date.now() });
    return '✅ En Drive';
  } catch (e) {
    return '❌ Error Drive';
  }
}

async function sendViaFirebase(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const MAX = 400;
        const ratio = Math.min(MAX / img.width, MAX / img.height);
        c.width = img.width * ratio;
        c.height = img.height * ratio;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const thumb = c.toDataURL('image/jpeg', 0.7);
        roomRef.child('photos').push({ dataUrl: thumb, ts: Date.now() });
        resolve('✅ (sin Drive, miniatura)');
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(blob);
  });
}

function showCmdToast(text) {
  const el = document.getElementById('cmd-toast');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

document.getElementById('folder-id')?.addEventListener('change', (e) => {
  if (roomRef) roomRef.child('config/folderId').set(e.target.value.trim());
});

// ──────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────
generateRoom();
</script>
